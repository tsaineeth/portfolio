<!doctype html>
<html data-bs-theme="light" lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta content="width=device-width, initial-scale=1" name="viewport" />
        <title>Saineeth's Portfolio</title>
        <!-- Bootstrap 5 CDN -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
                rel="stylesheet"
                href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
        <link href="assets/css/switch.css" rel="stylesheet" />
    </head>
    <body id="content">
        <header id="header border-bottom">
            <div class="container-fluid">
                <div class="row align-items-center">
                    <nav class="navbar navbar-expand-lg border-bottom sticky-top shadow-sm">
                        <!-- Left -->
                        <div class="col-3">
                            <!-- Mobile Toggle -->
                            <button
                                class="navbar-toggler"
                                type="button"
                                data-bs-toggle="collapse"
                                data-bs-target="#navbarNav"
                            >
                                <span class="navbar-toggler-icon"></span>
                            </button>
                        </div>

                        <!-- Center -->
                        <div class="col-6 d-flex justify-content-center">
                            <h1 class="fw-light text-secondary mb-0">
                                <span class="fw-light" id="firstName"></span>
                                <span class="fw-medium" id="lastName"></span>
                            </h1>
                        </div>

                        <!-- Right -->
                        <div class="col-2 d-flex justify-content-end align-items-center pe-1">
                            <!--Download Button-->
                            <button class="btn btn-dark mb-2 mx-2" id="downloadBtn" type="button">
                                Download
                                <i class="bi bi-download"></i>
                            </button>

                            <!-- From Uiverse.io by Galahhad -->
                            <label class="ui-switch">
                                <input id="themeSwitcher" type="checkbox" />
                                <div class="slider">
                                    <div class="circle"></div>
                                </div>
                            </label>
                        </div>
                    </nav>
                </div>
            </div>
        </header>

        <main class="container py-3 mb-2" id="main">
            <!-- About -->
            <section class="card shadow-sm mb-2">
                <div class="card-body">
                    <h5 class="card-title text-secondary fs-3 fw-light">About Me</h5>
                    <h6 class="card-subtitle mb-2 mt-4" id="aboutTitle"></h6>
                    <p class="card-text fw-normal" id="aboutBio"></p>
                </div>
            </section>

            <div class="row g-4">
                <aside class="col-lg-6">
                    <div class="card shadow-sm mx-auto mt-2">
                        <div class="card-body">
                            <h5 class="card-title text-secondary fs-3 fw-light">SKILLS</h5>
                            <div class="container-fluid ps-0 mx-auto" id="technicalSkills"></div>
                            <div class="container-fluid ps-0 mx-auto" id="softSkills"></div>
                            <div class="container-fluid ps-0 mx-auto" id="certifications"></div>
                        </div>
                    </div>
                    <div class="card shadow-sm mx-auto mt-2">
                        <div class="card-body">
                            <h5 class="card-title text-secondary fs-3 fw-light">
                                Technical Highlights
                            </h5>
                            <div
                                class="container-fluid ps-0 mx-auto"
                                id="technicalHighlights"
                            ></div>
                        </div>
                    </div>
                    <div class="card shadow-sm mx-auto mt-2">
                        <div class="card-body">
                            <h5 class="card-title text-secondary fs-3 fw-light">EDUCATION</h5>
                            <div class="container-fluid ps-0 mx-auto" id="education"></div>
                        </div>
                    </div>
                </aside>
                <aside class="col-lg-6">
                    <div class="card shadow-sm mx-auto mt-2">
                        <div class="card-body">
                            <h5 class="card-title text-secondary fs-3 fw-light">EXPERIENCE</h5>
                            <div class="container-fluid ps-0" id="experience"></div>
                        </div>
                    </div>
                </aside>
            </div>

            <!-- Contact -->
            <section class="card shadow-sm mt-3">
                <div class="card-body">
                    <h5 class="card-title text-secondary fs-3 fw-light">Contact</h5>
                    <div class="row g-3">
                        <!-- Email -->
                        <div class="col-12 col-md-4">
                            <a
                                    href="mailto:tsaineeth@gmail.com"
                                    id="email"
                                    target="_blank"
                                    class="text-decoration-none text-body"
                            >
                                <div class="d-flex align-items-center border rounded p-3 h-100">
                                    <i class="bi bi-envelope fs-3 me-3"></i>

                                    <div>
                                        <div class="fw-semibold">Email</div>

                                        <small class="text-body-secondary">
                                            tsaineeth@gmail.com
                                        </small>
                                    </div>
                                </div>
                            </a>
                        </div>

                        <!-- GitHub -->
                        <div class="col-12 col-md-4">
                            <a
                                href="https://github.com/tsaineeth"
                                id="github"
                                target="_blank"
                                class="text-decoration-none text-body"
                            >
                                <div class="d-flex align-items-center border rounded p-3 h-100">
                                    <i class="bi bi-github fs-3 me-3"></i>

                                    <div>
                                        <div class="fw-semibold">GitHub</div>

                                        <small class="text-body-secondary">
                                            github.com/tsaineeth
                                        </small>
                                    </div>
                                </div>
                            </a>
                        </div>

                        <!-- LinkedIn -->
                        <div class="col-12 col-md-4">
                            <a
                                href="https://linkedin.com/in/tsaineeth"
                                id="linkedin"
                                target="_blank"
                                class="text-decoration-none text-body"
                            >
                                <div class="d-flex align-items-center border rounded p-3 h-100">
                                    <i class="bi bi-linkedin fs-3 text-primary me-3"></i>

                                    <div>
                                        <div class="fw-semibold">LinkedIn</div>

                                        <small class="text-body-secondary">
                                            linkedin.com/in/tsaineeth
                                        </small>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </section>
            <!--    <div class="toast" role="alert" aria-live="assertive" aria-atomic="true">-->
            <!--        <div class="toast-header">-->
            <!--            <strong class="me-auto">Bootstrap</strong>-->
            <!--            <small>11 mins ago</small>-->
            <!--            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>-->
            <!--        </div>-->
            <!--        <div class="toast-body">-->
            <!--            Downloaded resume.-->
            <!--        </div>-->
            <!--    </div>-->
        </main>

        <footer class="text-center text-lg-start border-top mt-5 py-3" id="footer">
            <div
                class="container d-flex flex-column flex-md-row justify-content-between align-items-center"
            >
                <p class="mb-2 mb-md-0 text-muted">
                    &copy; <span id="year"></span> Saineeth Togrikar. All rights reserved.
                </p>
                <div>
                    <a
                        aria-label="GitHub"
                        class="text-muted me-3"
                        href="https://github.com/tsaineeth"
                        target="_blank"
                    >
                        <i class="fab fa-github fa-lg"></i>
                    </a>
                    <a
                        aria-label="LinkedIn"
                        class="text-muted me-3"
                        href="https://linkedin.com/in/tsaineeth"
                        target="_blank"
                    >
                        <i class="fab fa-linkedin fa-lg"></i>
                    </a>
                    <a aria-label="Email" class="text-muted" href="mailto:tsaineeth@gmail.com">
                        <i class="fas fa-envelope fa-lg"></i>
                    </a>
                </div>
            </div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <script src="./assets/js/script.js"></script>
    </body>
</html>
